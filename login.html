<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Bolsa de Oficiales</title>

<style>
:root{
    --azul:#0b6bff;
    --azul-oscuro:#063c8f;
    --texto:#102033;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#e8f3ff,#ffffff);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.contenedor{
    width:100%;
    max-width:1000px;
    background:white;
    border-radius:30px;
    box-shadow:0 20px 60px rgba(0,70,160,.18);
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 420px;
}

.lado-azul{
    background:linear-gradient(135deg,var(--azul),var(--azul-oscuro));
    color:white;
    padding:50px;
}

.logo{
    width:130px;
    height:60px;
    border-radius:18px;
    background:#061225;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:40px;
    overflow:hidden;
    box-shadow:0 18px 40px rgba(0,0,0,.25);
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.lado-azul h1{
    font-size:38px;
    margin:0 0 15px;
}

.lado-azul p{
    font-size:18px;
    line-height:1.5;
    opacity:.9;
}

.panel{
    padding:45px;
}

.tabs{
    display:flex;
    background:#eef5ff;
    border-radius:16px;
    padding:6px;
    margin-bottom:30px;
}

.tabs button{
    width:50%;
    border:0;
    background:transparent;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    color:#4b5b70;
}

.tabs button.activo{
    background:white;
    color:var(--azul);
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h2{
    margin-top:0;
    color:var(--texto);
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:7px;
    font-weight:bold;
    color:var(--texto);
}

input, select{
    width:100%;
    padding:15px;
    border:1px solid #d8e3f0;
    border-radius:14px;
    font-size:16px;
}

.boton{
    width:100%;
    margin-top:25px;
    padding:16px;
    border:0;
    border-radius:14px;
    background:linear-gradient(135deg,var(--azul),var(--azul-oscuro));
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.boton:disabled{
    opacity:.6;
    cursor:not-allowed;
}

.oculto{
    display:none !important;
}

.aviso{
    margin-top:18px;
    padding:12px;
    border-radius:12px;
    background:#eaf3ff;
    color:#063c8f;
    display:none;
    font-weight:bold;
}

.aviso.ok{
    background:#e9f9ef;
    color:#137a34;
}

.aviso.error{
    background:#fff0f0;
    color:#c82121;
}

.volver{
    display:block;
    margin-top:25px;
    color:var(--azul);
    text-decoration:none;
    font-weight:bold;
}

@media(max-width:850px){
    .contenedor{
        grid-template-columns:1fr;
    }

    .lado-azul{
        padding:35px;
    }

    .panel{
        padding:35px;
    }
}
</style>
</head>

<body>

<div class="contenedor">

    <section class="lado-azul">
        <div class="logo">
            <img src="img/logo_g6k.jpg" alt="Logo G6K">
        </div>

        <h1>Bolsa de Oficiales</h1>

        <p>
            Acceso para federación, organizadores y oficiales.
            
        </p>
    </section>

    <section class="panel">

        <div class="tabs">
            <button id="btnTabLogin" class="activo" type="button">Entrar</button>
            <button id="btnTabRegistro" type="button">Registro</button>
        </div>

        <div id="formLogin">
            <h2>Iniciar sesión</h2>

            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="correo@ejemplo.com">

            <label>Contraseña</label>
            <input type="password" id="loginPassword" placeholder="Contraseña">

            <button class="boton" id="btnEntrar" type="button">Entrar</button>

            <div class="aviso" id="avisoLogin"></div>
        </div>

        <div id="formRegistro" class="oculto">
            <h2>Crear cuenta</h2>

            <label>Nombre</label>
            <input type="text" id="registroNombre" placeholder="Nombre completo">

            <label>Email</label>
            <input type="email" id="registroEmail" placeholder="correo@ejemplo.com">

            <label>Contraseña</label>
            <input type="password" id="registroPassword" placeholder="Mínimo 6 caracteres">

            <label>Tipo de usuario</label>
            <select id="registroRol">
                <option value="oficial">Oficial</option>
                <option value="organizador">Organizador</option>
                <option value="admin">Administrador Federación</option>
            </select>

            <button class="boton" id="btnCrearCuenta" type="button">Crear cuenta</button>

            <div class="aviso" id="avisoRegistro"></div>
        </div>

        <a href="index.html" class="volver">← Volver al inicio</a>

    </section>

</div>

<script>
const btnTabLogin = document.getElementById("btnTabLogin");
const btnTabRegistro = document.getElementById("btnTabRegistro");
const formLogin = document.getElementById("formLogin");
const formRegistro = document.getElementById("formRegistro");

btnTabLogin.addEventListener("click", function(){
    formLogin.classList.remove("oculto");
    formRegistro.classList.add("oculto");
    btnTabLogin.classList.add("activo");
    btnTabRegistro.classList.remove("activo");
});

btnTabRegistro.addEventListener("click", function(){
    formLogin.classList.add("oculto");
    formRegistro.classList.remove("oculto");
    btnTabLogin.classList.remove("activo");
    btnTabRegistro.classList.add("activo");
});
</script>

<script type="module" src="js/login-firebase.js"></script>

</body>
</html>
